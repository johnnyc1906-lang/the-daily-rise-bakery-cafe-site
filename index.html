<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Daily Rise Bakery & Cafe | Sandy Hook, CT</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #FAF6F0;
    --warm-white: #FFFDF9;
    --brown-dark: #3B2314;
    --brown-mid: #6B3A2A;
    --brown-light: #A0522D;
    --gold: #C8973A;
    --gold-light: #E8C87A;
    --sage: #7A8C6A;
    --text-dark: #2A1A0E;
    --text-mid: #5A3E2B;
    --text-light: #8B6F5A;
    --shadow: 0 4px 30px rgba(59,35,20,0.12);
    --shadow-lg: 0 12px 50px rgba(59,35,20,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Lato', sans-serif;
    background-color: var(--warm-white);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  /* ========== NAVBAR ========== */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: rgba(250,246,240,0.95);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(200,151,58,0.2);
    padding: 0 5%;
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 2px 20px rgba(59,35,20,0.08);
  }

  .nav-logo {
    display: flex;
    flex-direction: column;
    text-decoration: none;
    line-height: 1.1;
  }

  .nav-logo .logo-main {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.2rem, 2vw, 1.6rem);
    color: var(--brown-dark);
    font-weight: 600;
  }

  .nav-logo .logo-sub {
    font-family: 'Lato', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 700;
  }

  .nav-links {
    display: flex;
    gap: 2rem;
    list-style: none;
    align-items: center;
  }

  .nav-links a {
    font-family: 'Lato', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    transition: color 0.3s;
    cursor: pointer;
  }

  .nav-links a:hover { color: var(--gold); }

  .nav-cta {
    background: var(--brown-dark) !important;
    color: var(--cream) !important;
    padding: 0.5rem 1.2rem !important;
    border-radius: 30px !important;
    transition: background 0.3s !important;
  }

  .nav-cta:hover { background: var(--gold) !important; color: var(--brown-dark) !important; }

  .hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 8px;
  }

  .hamburger span {
    display: block;
    width: 25px;
    height: 2px;
    background: var(--brown-dark);
    transition: all 0.3s;
    border-radius: 2px;
  }

  .mobile-menu {
    display: none;
    position: fixed;
    top: 72px; left: 0; right: 0;
    background: var(--cream);
    z-index: 999;
    padding: 1.5rem 5%;
    box-shadow: 0 8px 30px rgba(59,35,20,0.15);
    border-bottom: 2px solid var(--gold);
  }

  .mobile-menu.open { display: block; }

  .mobile-menu ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .mobile-menu ul li a {
    display: block;
    padding: 0.9rem 0;
    font-family: 'Lato', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-mid);
    text-decoration: none;
    border-bottom: 1px solid rgba(200,151,58,0.2);
    transition: color 0.3s;
    cursor: pointer;
  }

  .mobile-menu ul li:last-child a { border-bottom: none; }
  .mobile-menu ul li a:hover { color: var(--gold); }

  /* ========== HERO ========== */
  #hero {
    position: relative;
    height: 100vh;
    min-height: 600px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    z-index: 0;
  }

  .hero-bg img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
  }

  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(42,26,14,0.75) 0%,
      rgba(59,35,20,0.55) 50%,
      rgba(59,35,20,0.35) 100%
    );
    z-index: 1;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 0 5%;
    max-width: 800px;
  }

  .hero-badge {
    display: inline-block;
    background: rgba(200,151,58,0.9);
    color: var(--brown-dark);
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 0.4rem 1.2rem;
    border-radius: 30px;
    margin-bottom: 1.2rem;
  }
